name: Deploy to Azure VM

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            set -e

            cd ~/proyecto-ingenieria-software

            # Ensure branch and avoid pull failure when server has local changes
            git checkout main
            if ! git diff --quiet || ! git diff --cached --quiet; then
              git stash push --include-untracked -m "auto-deploy-$(date +%Y%m%d-%H%M%S)" || true
            fi
            # Force server working tree to match remote main (handles diverged history/force-push)
            git fetch --prune origin main
            git reset --hard origin/main
            # Keep only the 5 most recent auto-deploy stashes
            AUTO_STASHES=$(git stash list | grep "auto-deploy-" | tail -n +6 | cut -d: -f1 || true)
            if [ -n "$AUTO_STASHES" ]; then
              echo "$AUTO_STASHES" | while read -r STASH_REF; do
                [ -n "$STASH_REF" ] && git stash drop "$STASH_REF" || true
              done
            fi

            # Create/update .env for production
            cat > .env << 'ENVEOF'
            NODE_ENV=production
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=uvg_collab
            DB_PORT=5432
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@postgres:5432/uvg_collab?schema=public
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_API_PREFIX=/api
            NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
            ENVEOF

            # Stop previous app services
            docker compose --profile app down

            # Build and deploy only required services (skip pgadmin in production)
            docker compose --profile app up -d --build postgres backend frontend

            # Wait for backend health endpoint
            echo "Waiting for backend to be healthy..."
            for i in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:3001/api >/dev/null; then
                echo "Backend is healthy."
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "Backend did not become healthy in time"
                docker compose --profile app ps
                docker compose logs --tail=120 backend || true
                exit 1
              fi
              sleep 5
            done

            # Seed catalogs/base data (idempotent)
            docker compose exec -T backend npx prisma db seed

            # Show status
            docker compose --profile app ps

            # Clean old images
            docker image prune -f
